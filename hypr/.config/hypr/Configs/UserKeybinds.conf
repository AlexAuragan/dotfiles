# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# This is where you put your own keybinds. Be Mindful to check as well ~/.config/hypr/configs/Keybinds.conf to avoid conflict
# if you think I should replace the Pre-defined Keybinds in ~/.config/hypr/configs/Keybinds.conf , submit an issue or let me know in DC and present me a valid reason as to why, such as conflicting with global shortcuts, etc etc

# See https://wiki.hyprland.org/Configuring/Keywords/ for more settings and variables
# See also Laptops.conf for laptops keybinds

$mainMod = SUPER
$subMod = SUPER ALT
$toolMod = SUPER CTRL
$speMod = SUPER CTRL ALT

$files = thunar
$term = kitty
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/Scripts
$UserConfigs = $HOME/.config/hypr/Configs
$QuickshellScripts = $HOME/.config/quickshell/scripts

# $configs = $HOME/.config/hypr/configs
#!
## headers
bind = Super, mouse_up,  global, quickshell:overviewToggleReleaseInterrupt # [hidden]
bind = Super, mouse_down,global, quickshell:overviewToggleReleaseInterrupt # [hidden]
bindit = ,Super_L, global, quickshell:workspaceNumber # [hidden]
bindit = ,Super_R, global, quickshell:workspaceNumber # [hidden]


##! Main shortcuts
bind = $mainMod, D, exec, pkill rofi || rofi -show drun -modi drun,filebrowser,run,window # Rofi app launcher
bind = $mainMod, Return, exec, $term # -e tmux  # Launch terminal
bind = $mainMod, T, exec, $files # Launch file manager
bind = $mainMod, P, exec, /home/alex/.local/bin/pycharm # Open Pycharm
bind = $mainMod, V, exec, zen-browser # Open Zen-browser
bind = $mainMod SHIFT, V, exec, zen-browser --private-window # Open Zen-browser
bindd = $mainMod, Tab, Toggle overview, global, quickshell:overviewToggle # Overview
# bindd = $mainMod, X, Toggle overview, global, quickshell:overviewToggle
bindd = $mainMod, A, Toggle left sidebar, global, quickshell:sidebarLeftToggle # Toggle left sidebar - AI
bindd = $mainMod, G, Toggle right sidebar, global, quickshell:sidebarRightToggle # Toggle right sidebar - Notifications
bind = $mainMod, R, exec, $UserScripts/WallpaperSelect.sh # Select wallpaper to apply
# bind = $mainMod, R, exec, $QuickshellScripts/colors/switchwall.sh # Select WallpaperSelect
bindd = $mainMod, K, Toggle media controls, global, quickshell:mediaControlsToggle # Toggle media controls
bindd = $mainMod, Delete, Toggle session menu, global, quickshell:sessionToggle # Toggle session menu
bindd = $mainMod, comma, Toggle bar, global, quickshell:barToggle # Toggle bar
bind = $mainMod, W, killactive # Kill window
bind = $mainMod, F, fullscreen # fullscreen
bind = $mainMod SHIFT, W, exec, $scriptsDir/KillActiveProcess.sh # Hard kill process
bind = $mainMod SHIFT, F, togglefloating, # Toggle Floating
bind = CTRL, SPACE, global, kando:navigation # Open Kando navigation

##! Tools
bind = $toolMod, C, exec, $UserScripts/RofiCalc.sh # calculator (qalculate)
bind = $toolMod, V, exec, $scriptsDir/ClipManager.sh # Clipboard Manager
# bindd = $toolMod, G, Emoji >> clipboard, global, quickshell:overviewEmojiToggle#
bind = $toolMod, G, exec, $scriptsDir/RofiEmoji.sh # Rofi emoji
bindd = $toolMod, K, Toggle on-screen keyboard, global, quickshell:oskToggle # Toggle on-screen keyboard
bindd = $toolMod, P, Color picker, exec, hyprpicker -a # Pick color (Hex) >> clipboard

##! Special
# bind = $subMod, A, global, quickshell:sidebarLeftToggleDetach
bindd = $mainMod, H, Toggle cheatsheet, global, quickshell:cheatsheetToggle # Toggle cheatsheetToggle
bind = $mainMod, C, exec, $UserScripts/QuickEdit.sh # Quick Edit Hyprland Settings

#!
##! System
bindel = , xf86audioraisevolume, exec, $scriptsDir/Volume.sh --inc # [hidden] volume up
bindel = , xf86audiolowervolume, exec, $scriptsDir/Volume.sh --dec # [hidden] volume down
bindl = , xf86AudioMicMute, exec, $scriptsDir/Volume.sh --toggle-mic # [hidden] mute mic
bindl = , xf86audiomute, exec, $scriptsDir/Volume.sh --toggle # [hidden] mute sound
bindl = , xf86Sleep, exec, systemctl suspend  # [hidden] sleep button
bindl = , xf86Rfkill, exec, $scriptsDir/AirplaneMode.sh # [hidden] Airplane mode

bindl = , xf86AudioPlayPause, exec, $scriptsDir/MediaCtrl.sh --pause # [hidden]
bindl = , xf86AudioPause, exec, $scriptsDir/MediaCtrl.sh --pause # [hidden]
bindl = , xf86AudioPlay, exec, $scriptsDir/MediaCtrl.sh --pause # [hidden]
bindl = , xf86AudioNext, exec, $scriptsDir/MediaCtrl.sh --nxt # [hidden]
bindl = , xf86AudioPrev, exec, $scriptsDir/MediaCtrl.sh --prv # [hidden]
bindl = , xf86audiostop, exec, $scriptsDir/MediaCtrl.sh --stop # [hidden]


bind = , XF86MonBrightnessUp, exec, ddcutil setvcp 10 + 10 --bus=9 # [hidden]
bind = , XF86MonBrightnessDown, exec, ddcutil setvcp 10 - 10 --bus=9 # [hidden]
bind = CTRL,XF86MonBrightnessUp, exec, ddcutil setvcp 10 + 10 --bus=12 # [hidden]
bind = CTRL,XF86MonBrightnessDown, exec, ddcutil setvcp 10 - 10 --bus=12 # [hidden]

bind = $mainMod, Print, exec, $scriptsDir/ScreenShot.sh --now # Screenshot all now
bind = ,Print, exec, $scriptsDir/ScreenShot.sh --area # Screenshot area now
bind = $mainMod CTRL, Print, exec, $scriptsDir/ScreenShot.sh --in5 # screenshot in 5 secs
bind = ALT, Print, exec, $scriptsDir/ScreenShot.sh --active # Screenshot of active window

bind = CTRL ALT, L, exec, $scriptsDir/LockScreen.sh # Lock screen
bind = CTRL ALT, P, exec, $scriptsDir/Wlogout.sh # Logout menu

bind = CTRL ALT, R, exec, $scriptsDir/Refresh.sh # Refresh hyprland, quickshell, etc
bind = $mainMod, S, exec, $scriptsDir/RofiSearch.sh # Google search from Rofi
bind = $mainMod SHIFT, B, exec, $scriptsDir/ChangeBlur.sh # Toggle blur settings
bind = $mainMod SHIFT, G, exec, $scriptsDir/GameMode.sh # animations ON/OFF
bind = $mainMod ALT, L, exec, $scriptsDir/ChangeLayout.sh # Toggle Master or Dwindle Layout

bind = $mainMod, C, exec, $UserScripts/QuickEdit.sh # Quick Edit Hyprland Settings
##! Workspaces
# Resize windows
binde = $mainMod SHIFT, left, resizeactive,-50 0 # Resize active window
binde = $mainMod SHIFT, right, resizeactive,50 0 # [hidden]
binde = $mainMod SHIFT, up, resizeactive,0 -50 # [hidden]
binde = $mainMod SHIFT, down, resizeactive,0 50 # [hidden]

# Move windows
bind = $mainMod CTRL, left, movewindow, l # Move active window
bind = $mainMod CTRL, right, movewindow, r # [hidden]
bind = $mainMod CTRL, up, movewindow, u # [hidden]
bind = $mainMod CTRL, down, movewindow, d # [hidden]

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l # Move focus
bind = $mainMod, right, movefocus, r # [hidden]
bind = $mainMod, up, movefocus, u # [hidden]
bind = $mainMod, down, movefocus, d # [hidden]

# The following mappings use the key codes to better support various keyboard layouts
$workspace_key_1 = j
$workspace_key_2 = l
$workspace_key_3 = o
$workspace_key_4 = y
$workspace_key_5 = colon
$workspace_key_6 = m
$workspace_key_7 = n
$workspace_key_8 = e
$workspace_key_9 = i
$workspace_key_10 = u


# Put the workspace on the current screen
bind = $mainMod, $workspace_key_1, focusworkspaceoncurrentmonitor, 1 # Switch to workspace
bind = $mainMod, $workspace_key_2, focusworkspaceoncurrentmonitor, 2 # [hidden]
bind = $mainMod, $workspace_key_3, focusworkspaceoncurrentmonitor, 3 # [hidden]
bind = $mainMod, $workspace_key_4, focusworkspaceoncurrentmonitor, 4 # [hidden]
bind = $mainMod, $workspace_key_5, focusworkspaceoncurrentmonitor, 5 # [hidden]
bind = $mainMod, $workspace_key_6, focusworkspaceoncurrentmonitor, 6 # [hidden]
bind = $mainMod, $workspace_key_7, focusworkspaceoncurrentmonitor, 7 # [hidden]
bind = $mainMod, $workspace_key_8, focusworkspaceoncurrentmonitor, 8 # [hidden]
bind = $mainMod, $workspace_key_9, focusworkspaceoncurrentmonitor, 9 # [hidden]
bind = $mainMod, $workspace_key_10, focusworkspaceoncurrentmonitor, 10 # [hidden]
bind = $mainMod, code:10, focusworkspaceoncurrentmonitor, 1
# bind = $mainMod, code:11, focusworkspaceoncurrentmonitor, 2
# bind = $mainMod, code:12, focusworkspaceoncurrentmonitor, 3
# bind = $mainMod, code:13, focusworkspaceoncurrentmonitor, 4
# bind = $mainMod, code:14, focusworkspaceoncurrentmonitor, 5
# bind = $mainMod, code:15, focusworkspaceoncurrentmonitor, 6
# bind = $mainMod, code:16, focusworkspaceoncurrentmonitor, 7
# bind = $mainMod, code:17, focusworkspaceoncurrentmonitor, 8
# bind = $mainMod, code:18, focusworkspaceoncurrentmonitor, 9
# bind = $mainMod, code:19, focusworkspaceoncurrentmonitor, 10


# Move active window and follow to workspace mainMod + SHIFT [0-9]
bind = $mainMod SHIFT, $workspace_key_1, movetoworkspace, 1 # Move to workspace
bind = $mainMod SHIFT, $workspace_key_2, movetoworkspace, 2 # [hidden]
bind = $mainMod SHIFT, $workspace_key_3, movetoworkspace, 3 # [hidden]
bind = $mainMod SHIFT, $workspace_key_4, movetoworkspace, 4 # [hidden]
bind = $mainMod SHIFT, $workspace_key_5, movetoworkspace, 5 # [hidden]
bind = $mainMod SHIFT, $workspace_key_6, movetoworkspace, 6 # [hidden]
bind = $mainMod SHIFT, $workspace_key_7, movetoworkspace, 7 # [hidden]
bind = $mainMod SHIFT, $workspace_key_8, movetoworkspace, 8 # [hidden]
bind = $mainMod SHIFT, $workspace_key_9, movetoworkspace, 9 # [hidden]
bind = $mainMod SHIFT, $workspace_key_10, movetoworkspace, 10 # [hidden]

# Move active window to a workspace silently mainMod + CTRL [0-9]
bind = $mainMod CTRL, $workspace_key_1, movetoworkspacesilent, 1 # Move to workspace (silently)
bind = $mainMod CTRL, $workspace_key_2, movetoworkspacesilent, 2 # [hidden]
bind = $mainMod CTRL, $workspace_key_3, movetoworkspacesilent, 3 # [hidden]
bind = $mainMod CTRL, $workspace_key_4, movetoworkspacesilent, 4 # [hidden]
bind = $mainMod CTRL, $workspace_key_5, movetoworkspacesilent, 5 # [hidden]
bind = $mainMod CTRL, $workspace_key_6, movetoworkspacesilent, 6 # [hidden]
bind = $mainMod CTRL, $workspace_key_7, movetoworkspacesilent, 7 # [hidden]
bind = $mainMod CTRL, $workspace_key_8, movetoworkspacesilent, 8 # [hidden]
bind = $mainMod CTRL, $workspace_key_9, movetoworkspacesilent, 9 # [hidden]
bind = $mainMod CTRL, $workspace_key_10, movetoworkspacesilent, 10 # [hidden]

bindm = $mainMod, mouse:272, movewindow # Resize window
bindm = $mainMod, mouse:273, resizewindow # Resize window
